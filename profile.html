<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Profile - OBMC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
           
            background-image: url('https://img.freepik.com/free-vector/abstract-modern-geometric-shape-white-backdrop-with-text-space_1017-51516.jpg');
            background-size: cover;
            background-attachment: fixed;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
        }

        .sidebar {
            height: 100vh;
            width: 250px;
            background-color: #212529;
            color: white;
            position: fixed;
            padding-top: 20px;
        }

        .sidebar .logo-container {
            text-align: center;
            margin-bottom: 30px;
        }

        .sidebar img {
            /* Your provided Logo Link */
            width: 80px;
            height: 80px;
            object-fit: contain;
        }

        .nav-link {
            color: #adb5bd;
            padding: 15px 25px;
            text-decoration: none;
            display: block;
            transition: 0.3s;
        }

        .nav-link:hover, .nav-link.active {
            color: white;
            background-color: #343a40;
        }

        .main-content {
            margin-left: 250px;
            padding: 40px;
            width: 100%;
        }

        .profile-label {
            background-color: #212529;
            color: white;
            display: inline-block;
            padding: 10px 25px;
            border-radius: 8px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .info-card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 550px;
        }

        .avatar-circle {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            background-color: #00bcd4;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }

        .btn-cyan {
            background-color: #00bcd4;
            color: white;
            border-radius: 25px;
            font-weight: bold;
            padding: 10px;
            border: none;
            transition: 0.3s;
        }

        .btn-cyan:hover {
            background-color: #00acc1;
            transform: translateY(-2px);
        }

        footer {
            position: fixed;
            bottom: 0;
            right: 0;
            background: rgba(33, 37, 41, 0.8);
            color: white;
            padding: 5px 20px;
            font-size: 11px;
            border-top-left-radius: 15px;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo-container">
            <img src="https://img.freepik.com/premium-vector/blue-gold-logo-with-diploma-center-it_788759-4391.jpg?w=360x" alt="OBMC Logo">
        </div>
        <nav class="nav flex-column">
            <a class="nav-link" href="dashboard.html">Dashboard</a>
            <a class="nav-link" href="notebooks.html">Virtual Notebooks</a>
            <a class="nav-link" href="tasks.html">Tasks</a>
            <a class="nav-link active" href="profile.html">Profile</a>
            <a class="nav-link" href="index.html">Logout</a>
        </nav>
    </div>

    <div class="main-content">
        <div class="profile-label">STUDENT PROFILE</div>
        <p class="text-secondary">Manage your account information</p>

        <div class="row mt-4">
            <div class="col-md-5 text-center">
                <div class="avatar-circle">
                    <svg width="70" height="70" fill="white" viewBox="0 0 16 16">
                        <path d="M3 14s-1 0-1-1 1-4 6-4 6 3 6 4-1 1-1 1H3zm5-6a3 3 0 1 0 0-6 3 3 0 0 0 0 6z"/>
                    </svg>
                </div>
                <input type="file" class="form-control form-control-sm w-75 mx-auto">
            </div>

            <div class="col-md-7">
                <div class="info-card">
                    <h5 class="mb-4 text-dark border-bottom pb-2">Personal Details</h5>
                    
                    <div class="mb-3">
                        <label class="text-muted small d-block">Student ID</label>
                        <span class="fw-bold">SN-2026-1901</SN-2026-1901></span>
                    </div>

                    <div class="mb-3">
                        <label class="text-muted small d-block">Full Name</label>
                        <span class="fw-bold">Soh Katowa</span>
                    </div>

                    <div class="mb-3">
                        <label class="text-muted small d-block">Email Address</label>
                        <span class="fw-bold">soh.k@obmontessori.edu.ph</span>
                    </div>

                    <div class="mb-4">
                        <label class="text-muted small d-block">Academic Level</label>
                        <span class="fw-bold">Grade 9 - Amethyst</span>
                    </div>

                    <button class="btn btn-cyan w-100" id="passBtn" onclick="processPasswordChange()">
                        Change Password
                    </button>
                </div>
            </div>
        </div>
    </div>

    <footer>
        Khloe Aba-a | ICT 9 Project | O.B. Montessori Center © 2026
    </footer>

    <script>
        function processPasswordChange() {
            let btn = document.getElementById('passBtn');
            btn.disabled = true;
            btn.innerText = "Processing...";

            
            let checks = ["Verifying ID...", "Checking Security...", "Authorizing..."];
            let resultText = "";

            for (let i = 0; i < checks.length; i++) {
                
                console.log("System Loop Step " + (i+1) + ": " + checks[i]);
            }

            
            setTimeout(() => {
                window.alert("Password reset link has been generated successfully after " + checks.length + " security iterations.");
                btn.disabled = false;
                btn.innerText = "Change Password";
            }, 1000);
        }
    </script>
</body>
</html>
