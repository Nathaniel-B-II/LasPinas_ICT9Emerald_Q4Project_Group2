<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Notebooks - OBMC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
         
            background-image: url('https://img.freepik.com/free-vector/abstract-modern-geometric-shape-white-backdrop-with-text-space_1017-51516.jpg');
            background-size: cover;
            background-attachment: fixed;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
        }

       
        .sidebar {
            height: 100vh;
            width: 250px;
            background-color: #212529;
            color: white;
            position: fixed;
            padding-top: 20px;
        }

        .sidebar .logo-container {
            text-align: center;
            margin-bottom: 30px;
        }

        .sidebar img {
            width: 80px;
            height: 80px;
            object-fit: contain;
        }

        .nav-link {
            color: #adb5bd;
            padding: 15px 25px;
            text-decoration: none;
            display: block;
            transition: 0.3s;
        }

        .nav-link:hover, .nav-link.active {
            color: white;
            background-color: #343a40;
        }

    
        .main-content {
            margin-left: 250px;
            padding: 40px;
            width: 100%;
        }

        .header-label {
            background-color: #212529;
            color: white;
            display: inline-block;
            padding: 10px 25px;
            border-radius: 8px;
            font-weight: bold;
            margin-bottom: 10px;
        }

      
        .notebook-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border-left: 10px solid #00bcd4; 
            transition: 0.3s;
            text-align: center;
        }

        .notebook-card:hover {
            transform: translateY(-5px);
            background-color: #f0fbfc;
        }

        .btn-cyan {
            background-color: #00bcd4;
            color: white;
            border-radius: 20px;
            font-weight: bold;
            border: none;
            padding: 5px 25px;
        }

        footer {
            position: fixed;
            bottom: 0;
            right: 0;
            background: rgba(33, 37, 41, 0.8);
            color: white;
            padding: 5px 20px;
            font-size: 11px;
            border-top-left-radius: 15px;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo-container">
            <img src="https://img.freepik.com/premium-vector/blue-gold-logo-with-diploma-center-it_788759-4391.jpg?w=360x" alt="School Logo">
        </div>
        <nav class="nav flex-column">
            <a class="nav-link" href="dashboard.html">Dashboard</a>
            <a class="nav-link active" href="notebooks.html">Virtual Notebooks</a>
            <a class="nav-link" href="tasks.html">Tasks</a>
            <a class="nav-link" href="profile.html">Profile</a>
            <a class="nav-link" href="index.html">Logout</a>
        </nav>
    </div>

    <div class="main-content">
        <div class="header-label">VIRTUAL NOTEBOOKS</div>
        <p class="text-secondary">Welcome back, Soh Katowa. Select a notebook to continue.</p>

        <div id="notebook-list" class="row mt-4"></div>
    </div>

    <footer>
        Khloe Aba-a | Grade 9 - Amethyst | ICT Project © 2026
    </footer>

    <script>
      
        const subjects = ["Mathematics", "ICT 9", "Science", "English", "Filipino", "Social Studies"];
        const teachers = ["Mr. Verba", "ICT Dept", "Ms. Mendaro", "Ms. Avila", "Ms. Francisco", "Mr. Reynoso"];

       
        const list = document.getElementById('notebook-list');

        for (let i = 0; i < subjects.length; i++) {
            
         
            let col = document.createElement('div');
            col.className = "col-md-4 mb-4";

            col.innerHTML = `
                <div class="notebook-card">
                    <h5 class="fw-bold">${subjects[i]}</h5>
                    <p class="text-muted small">Academic Year 2025-2026</p>
                    <p class="small text-secondary">Teacher: ${teachers[i]}</p>
                    <button class="btn btn-cyan btn-sm" onclick="alert('Opening ${subjects[i]} Notebook...')">
                        Open Notes
                    </button>
                </div>
            `;

         
            list.appendChild(col);
        }
    </script>
</body>
</html>
