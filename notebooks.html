<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notebooks - Soh Katowa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-image: url('https://img.freepik.com/free-vector/abstract-modern-geometric-shape-white-backdrop-with-text-space_1017-51516.jpg');
            background-size: cover;
            background-attachment: fixed;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
        }

        /* Merged Sidebar Styling */
        .sidenav {
            height: 100%;
            width: 280px; /* Default width from Code 1 */
            position: fixed;
            z-index: 1;
            top: 0;
            left: 0;
            background-color: #111;
            overflow-x: hidden;
            padding-top: 20px;
            box-shadow: 2px 0 10px rgba(0,0,0,0.5);
            transition: 0.3s; /* Smooth opening/closing transition */
        }

        .sidenav img {
            display: block;
            margin-left: auto;
            margin-right: auto;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin-bottom: 20px;
        }

        .sidenav hr {
            color: #818181;
            margin: 0 20px 20px 20px;
        }

        .sidenav a {
            padding: 15px 15px 15px 32px;
            text-decoration: none;
            font-size: 18px;
            color: #818181;
            display: block;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .sidenav a:hover, .sidenav a.active {
            color: #f1f1f1;
            background-color: #212529;
            border-left: 5px solid #00bcd4;
        }

        .main-content {
            margin-left: 280px; /* Matches sidenav width */
            padding: 40px;
            width: 100%;
            transition: 0.3s;
        }

        .header-box {
            background-color: #111;
            color: white;
            display: inline-block;
            padding: 12px 30px;
            border-radius: 4px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .notebook-card {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border-top: 8px solid #00bcd4;
            text-align: center;
            transition: 0.3s;
        }

        .notebook-card:hover {
            transform: translateY(-5px);
            background-color: #ffffff;
        }

        .btn-open {
            background-color: #00bcd4;
            color: white;
            border-radius: 20px;
            font-weight: bold;
            border: none;
            padding: 8px 25px;
            margin-top: 10px;
        }

        footer {
            position: fixed;
            bottom: 0;
            right: 0;
            background: #111;
            color: white;
            padding: 6px 20px;
            font-size: 11px;
            border-top-left-radius: 15px;
        }
    </style>
</head>
<body>

    <div id="mySidenav" class="sidenav">
        <img src="https://img.freepik.com/premium-vector/blue-gold-logo-with-diploma-center-it_788759-4391.jpg?w=360x" alt="Logo">
        <hr>
        <a href="dashboard.html">Dashboard</a>
        <a href="notebooks.html" class="active">Virtual Notebooks</a>
        <a href="tasks.html">Tasks</a>
        <a href="profile.html">Profile</a>
        <a href="index.html">Logout</a>
    </div>

    <div id="main" class="main-content">
        <div class="header-box">VIRTUAL NOTEBOOKS</div>
        <p class="text-dark">Student: Soh Katowa</p>

        <div id="notebook-grid" class="row mt-4"></div>
    </div>

    <footer>
        Khloe Aba-a | Grade 9 - Amethyst © 2026
    </footer>

    <script>
        // Set initial width from Code 2
        document.getElementById("mySidenav").style.width = "280px";

        // Notebook Data Logic
        const subjects = ["Mathematics", "ICT 9", "Science", "English", "Filipino", "Social Studies"];
        const teachers = ["Mr. Verba", "ICT Dept", "Ms. Mendaro", "Ms. Avila", "Ms. Francisco", "Mr. Reynoso"];
        const grid = document.getElementById('notebook-grid');

        for (let i = 0; i < subjects.length; i++) {
            let col = document.createElement('div');
            col.className = "col-lg-4 col-md-6";

            col.innerHTML = `
                <div class="notebook-card">
                    <h4 class="fw-bold">${subjects[i]}</h4>
                    <p class="text-muted small">Academic Year 2025-2026</p>
                    <p class="text-secondary small">Instructor: ${teachers[i]}</p>
                    <button class="btn btn-open" onclick="alert('Accessing ${subjects[i]} Notebook...')">
                        Open Notes
                    </button>
                </div>
            `;
            grid.appendChild(col);
        }
    </script>
</body>
</html>
